services:
  - type: web
    name: maker-checker-api
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: MAKERCHECKER_CORS_ALLOWED_ORIGINS
        value: https://maker-checker-frontend.onrender.com

  - type: web
    name: maker-checker-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://maker-checker-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
