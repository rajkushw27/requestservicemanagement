spring:
  application:
    name: maker-checker
  datasource:
    url: jdbc:h2:mem:makerchecker;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

makerchecker:
  seed: true
  cors:
    allowed-origins: ${MAKERCHECKER_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  integration:
    # Shared key for system-to-system calls (X-Api-Key header). Demo-only single static
    # key — a real integration gets one key per calling system, hashed at rest, rotatable.
    api-key: ${MAKERCHECKER_API_KEY:demo-integration-key-change-me}

server:
  port: ${PORT:8080}
